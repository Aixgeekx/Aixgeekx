<svg width="760" height="340" viewBox="0 0 760 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bilibili traffic trend</title>
  <desc id="desc">A pink line chart showing cumulative Bilibili views increasing to 2,155,534.</desc>
  <style>
    .label{font:600 16px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
    .muted{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    .num{font:800 28px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
    .axis{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#9ca3af}
  </style>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="760" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="area" x1="397" y1="92" x2="397" y2="272" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6699" stop-opacity=".38"/>
      <stop offset="1" stop-color="#FF6699" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="758" height="338" rx="18" fill="url(#card)" stroke="#263241"/>
  <rect x="28" y="24" width="704" height="72" rx="14" fill="#0F172A" stroke="#263241"/>
  <text x="48" y="52" class="label">Traffic Data</text>
  <text x="48" y="75" class="muted">Cumulative playback · updated around noon Beijing time</text>
  <text x="580" y="56" class="num" text-anchor="end">2.155M</text>
  <text x="700" y="56" class="num" text-anchor="end">553</text>
  <text x="580" y="78" class="muted" text-anchor="end">views</text>
  <text x="700" y="78" class="muted" text-anchor="end">followers</text>

  <g transform="translate(48 116)">
    <line x1="52" y1="16" x2="672" y2="16" stroke="#243244" stroke-dasharray="8 10"/>
    <line x1="52" y1="62" x2="672" y2="62" stroke="#243244" stroke-dasharray="8 10"/>
    <line x1="52" y1="108" x2="672" y2="108" stroke="#243244" stroke-dasharray="8 10"/>
    <line x1="52" y1="154" x2="672" y2="154" stroke="#243244" stroke-dasharray="8 10"/>
    <text x="0" y="20" class="axis">215.6w</text>
    <text x="0" y="66" class="axis">215.5w</text>
    <text x="0" y="112" class="axis">215.4w</text>
    <text x="0" y="158" class="axis">215.3w</text>
    <text x="52" y="198" class="axis">02-28</text>
    <text x="258" y="198" class="axis">03-30</text>
    <text x="462" y="198" class="axis">04-29</text>
    <text x="640" y="198" class="axis">05-28</text>
    <path d="M52 158 C92 141 148 136 196 126 C248 113 301 106 350 92 C390 80 423 84 450 44 C480 12 535 -2 595 -22 C632 -34 660 -38 672 -58 L672 174 L52 174 Z" transform="translate(0 62)" fill="url(#area)"/>
    <path d="M52 220 C92 203 148 198 196 188 C248 175 301 168 350 154 C390 142 423 146 450 106 C480 74 535 60 595 40 C632 28 660 24 672 4" stroke="#FF6699" stroke-width="5" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" from="0 900" to="900 0" dur="1.4s" fill="freeze"/>
    </path>
    <circle cx="672" cy="4" r="9" fill="#FF6699">
      <animate attributeName="r" values="8;12;8" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <rect x="546" y="-32" width="126" height="36" rx="9" fill="#FF6699"/>
    <text x="609" y="-8" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">2,155,534</text>
  </g>
</svg>
