<svg width="760" height="340" viewBox="0 0 760 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bilibili engagement trend</title>
  <desc id="desc">A pink line chart showing Bilibili engagement increasing to 120,187 likes.</desc>
  <style>
    .label{font:600 16px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
    .muted{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    .num{font:800 27px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
    .axis{font:500 12px 'Segoe UI',Arial,sans-serif;fill:#9ca3af}
    .pill{font:700 12px 'Segoe UI',Arial,sans-serif;fill:white}
  </style>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="760" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="area" x1="390" y1="116" x2="390" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6699" stop-opacity=".34"/>
      <stop offset="1" stop-color="#FF6699" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="758" height="338" rx="18" fill="url(#card)" stroke="#263241"/>
  <rect x="28" y="24" width="704" height="82" rx="14" fill="#0F172A" stroke="#263241"/>
  <text x="48" y="52" class="label">Engagement Data</text>
  <text x="48" y="75" class="muted">Likes, favorites, coins, comments, danmaku, and shares</text>
  <text x="704" y="58" class="num" text-anchor="end">120,187</text>
  <text x="704" y="80" class="muted" text-anchor="end">likes</text>
  <g transform="translate(48 88)">
    <rect x="0" y="0" width="88" height="24" rx="7" fill="#FF6699"/>
    <text x="44" y="16" class="pill" text-anchor="middle">8,533 favorites</text>
    <rect x="98" y="0" width="78" height="24" rx="7" fill="#F59E0B"/>
    <text x="137" y="16" class="pill" text-anchor="middle">3,019 coins</text>
    <rect x="186" y="0" width="98" height="24" rx="7" fill="#14B8A6"/>
    <text x="235" y="16" class="pill" text-anchor="middle">4,362 comments</text>
    <rect x="294" y="0" width="96" height="24" rx="7" fill="#2563EB"/>
    <text x="342" y="16" class="pill" text-anchor="middle">7,532 danmaku</text>
    <rect x="400" y="0" width="86" height="24" rx="7" fill="#22C55E"/>
    <text x="443" y="16" class="pill" text-anchor="middle">5,261 shares</text>
  </g>

  <g transform="translate(48 130)">
    <line x1="52" y1="20" x2="672" y2="20" stroke="#243244" stroke-dasharray="8 10"/>
    <line x1="52" y1="66" x2="672" y2="66" stroke="#243244" stroke-dasharray="8 10"/>
    <line x1="52" y1="112" x2="672" y2="112" stroke="#243244" stroke-dasharray="8 10"/>
    <line x1="52" y1="158" x2="672" y2="158" stroke="#243244" stroke-dasharray="8 10"/>
    <text x="0" y="24" class="axis">12.0w</text>
    <text x="0" y="70" class="axis">11.9w</text>
    <text x="0" y="116" class="axis">11.8w</text>
    <text x="0" y="162" class="axis">11.7w</text>
    <text x="52" y="198" class="axis">02-28</text>
    <text x="258" y="198" class="axis">03-30</text>
    <text x="462" y="198" class="axis">04-29</text>
    <text x="640" y="198" class="axis">05-28</text>
    <path d="M52 166 L112 158 L170 150 L210 136 L238 104 L252 104 L268 68 L355 68 L370 52 L460 52 L475 38 L560 38 L575 24 L672 24 L672 182 L52 182 Z" fill="url(#area)"/>
    <path d="M52 166 L112 158 L170 150 L210 136 L238 104 L252 104 L268 68 L355 68 L370 52 L460 52 L475 38 L560 38 L575 24 L672 24" stroke="#FF6699" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" from="0 900" to="900 0" dur="1.4s" fill="freeze"/>
    </path>
    <circle cx="672" cy="24" r="9" fill="#FF6699">
      <animate attributeName="r" values="8;12;8" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <rect x="552" y="-8" width="120" height="36" rx="9" fill="#FF6699"/>
    <text x="612" y="16" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">120,187</text>
  </g>
</svg>
