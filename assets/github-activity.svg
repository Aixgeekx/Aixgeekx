<svg width="980" height="360" viewBox="0 0 980 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub activity dashboard</title>
  <desc id="desc">A compact GitHub activity dashboard with enlarged contribution, current streak, and longest streak numbers.</desc>
  <style>
    .title{font:800 22px 'Segoe UI',Arial,sans-serif;fill:#f8fafc}
    .muted{font:500 13px 'Segoe UI',Arial,sans-serif;fill:#94a3b8}
    .label{font:700 14px 'Segoe UI',Arial,sans-serif;fill:#cbd5e1}
    .num{font:900 54px 'Segoe UI',Arial,sans-serif;fill:#3B82F6}
    .small{font:700 16px 'Segoe UI',Arial,sans-serif;fill:#38BDF8}
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="980" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="line" x1="72" y1="284" x2="902" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset=".55" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="978" height="358" rx="18" fill="url(#bg)" stroke="#263241"/>
  <text x="38" y="48" class="title">GitHub Activity</text>
  <text x="38" y="72" class="muted">Compact profile snapshot with larger numbers and a denser visual rhythm.</text>

  <g transform="translate(38 100)">
    <rect x="0" y="0" width="284" height="106" rx="16" fill="#0F172A" stroke="#263241"/>
    <text x="24" y="34" class="label">Total Contributions</text>
    <text x="24" y="86" class="num">136</text>
    <text x="188" y="82" class="muted">Sep 3, 2023 - Present</text>
  </g>
  <g transform="translate(348 100)">
    <rect x="0" y="0" width="284" height="106" rx="16" fill="#0F172A" stroke="#263241"/>
    <text x="24" y="34" class="label">Current Streak</text>
    <text x="24" y="86" class="num">3</text>
    <text x="114" y="82" class="muted">May 27 - May 29</text>
  </g>
  <g transform="translate(658 100)">
    <rect x="0" y="0" width="284" height="106" rx="16" fill="#0F172A" stroke="#263241"/>
    <text x="24" y="34" class="label">Longest Streak</text>
    <text x="24" y="86" class="num">5</text>
    <text x="114" y="82" class="muted">May 10 - May 14</text>
  </g>

  <g transform="translate(38 236)">
    <text x="0" y="0" class="small">Recent activity rhythm</text>
    <text x="830" y="0" class="muted" text-anchor="end">code · docs · profile · tooling</text>
    <path d="M0 68 C95 54 126 50 194 58 C262 66 292 44 348 36 C417 26 470 54 536 42 C624 26 678 8 742 18 C798 26 842 12 904 4" stroke="url(#line)" stroke-width="5" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" from="0 1100" to="1100 0" dur="1.5s" fill="freeze"/>
    </path>
